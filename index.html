<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:24px 0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}
#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
@media(min-width:769px){#gifTop{width:53%;max-width:600px}}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 40px;box-shadow:none;border-radius:0}

/* ✟ 淡雅而冷冽的重工可拖拽 Dock 栏 ✟ */
#dock {
    position: fixed;
    left: 24px;
    top: 30%;
    background: rgba(15, 15, 18, 0.4); /* 极淡雅的半透明黑色基底 */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1); /* 低调微弱的边框线 */
    border-radius: 0px; /* 坚守绝对直角 */
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 999;
    width: 62px;
    height: 62px; /* 初始高度精确裁剪，隐匿底层按钮 */
    overflow: hidden;
    cursor: move;
    transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s, border-color 0.3s;
}

/* 鼠标悬停时优雅展开并浮现层次 */
#dock:hover {
    height: 222px; 
    background: rgba(8, 8, 10, 0.95);
    border-color: rgba(255, 255, 255, 0.4);
}

.item {
    width: 62px;
    height: 62px;
    border-radius: 0px;
    background: #0a0a0c;
    border: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    overflow: hidden;
    transition: background 0.3s, color 0.3s, border-color 0.3s;
    color: #666; /* 初始文字呈低反差暗灰色 */
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    writing-mode: vertical-lr;
    text-orientation: mixed;
}
/* 鼠标滑过单个选项时的刀锋反色 */
.item:hover {
    background: #fff;
    color: #000;
    border-color: #fff;
}
.item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 先锋极简字母矩阵美学区 */
.brand-section {
    width: 80%;
    max-width: 900px;
    margin: 20px 0 60px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 20px;
}
.brand-tag {
    font-size: 18px;
    font-weight: 200;
    letter-spacing: 1px;
    color: #444; /* 深邃内敛的无名灰 */
    text-align: center;
    padding: 20px;
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: color 0.4s, border-color 0.4s, background 0.4s;
}
.brand-tag:hover {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.02);
}

/* 遮罩面板黑化 */
#mask {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);justify-content:center;align-items:center;z-index:9999}
#card {background:#0a0a0c;padding:30px;border-radius:0px;border:1px solid rgba(255,255,255,0.15);position:relative}
#card img {width:min(80vw,320px);filter: grayscale(100%); transition: filter 0.3s}
#card img:hover {filter: grayscale(0%)}
#close {position:absolute;right:12px;top:8px;font-size:20px;font-weight:200;cursor:pointer;color:#666}
#close:hover {color:#fff}
</style></head>
<body>

<!-- ✟ 先锋重工可拖拽伸展 Dock ✟ -->
<div id="dock">
<div class="item"><img src="and.png"></div> <!-- 照片名字已更新为 and.png -->
<div class="item" onclick="location.href='https://andseethingsasido.github.io/and666/'">商品</div>
<div class="item" onclick="mask.style.display='flex'">公众号</div>
</div>

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<!-- A-F 极简极静矩阵 -->
<div class="brand-section">
    <div class="brand-tag">A</div>
    <div class="brand-tag">B</div>
    <div class="brand-tag">C</div>
    <div class="brand-tag">D</div>
    <div class="brand-tag">E</div>
    <div class="brand-tag">F</div>
</div>

<div id="mask" onclick="if(event.target===this)this.style.display='none'">
<div id="card"><div id="close" onclick="mask.style.display='none'">✕</div><img src="gozhonghao.jpg"></div>
</div>

<script>
gifBottom.onclick=()=>location.href="https://andseethingsasido.github.io/and666/";

// ==========================================
// 🛠️ 纯净物理拖拽引擎（完美剥离点击噪音）
// ==========================================
const dock = document.getElementById('dock');
let isDragging = false;
let startX, startY, initialLeft, initialTop;
let hasMoved = false;

function dragStart(e) {
    hasMoved = false;
    isDragging = true;
    
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const rect = dock.getBoundingClientRect();
    startX = clientX;
    startY = clientY;
    initialLeft = rect.left;
    initialTop = rect.top;
    
    dock.style.transition = 'none';
}

function dragMove(e) {
    if (!isDragging) return;
    
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const dx = clientX - startX;
    const dy = clientY - startY;
    
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
        hasMoved = true;
    }
    
    dock.style.left = (initialLeft + dx) + 'px';
    dock.style.top = (initialTop + dy) + 'px';
}

function dragEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    
    dock.style.transition = 'height 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s, border-color 0.3s';
    
    if (hasMoved) {
        e.preventDefault();
    }
}

dock.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);

dock.addEventListener('touchstart', dragStart, { passive: true });
document.addEventListener('touchmove', dragMove, { passive: false });
document.addEventListener('touchend', dragEnd);
</script>
</body>
</html>
