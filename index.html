<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Welcome</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        img {
            max-width: 80%;
            max-height: 28%;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            user-select: none;
            -webkit-user-drag: none;
            margin: 10px 0;
        }

        /* 第二张GIF可点击 */
        #gifBottom {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- 第一张GIF -->
    <img id="gifTop" src="and666.gif" alt="Live View Top">

    <!-- 第二张GIF（可点击） -->
    <img id="gifBottom" src="and777.gif" alt="Live View Bottom">

    <!-- 第三张PNG -->
    <img id="dao" src="dao.png" alt="DAO">

    <script>
        // 点击第二张GIF跳转
        const gifBottom = document.getElementById("gifBottom");

        gifBottom.addEventListener("click", function(event) {
            event.stopPropagation();
            window.location.href = "https://andseethingsasido.github.io/and666/";
        });
    </script>

</body>
</html>
