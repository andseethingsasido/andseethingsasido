<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:24px 0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}
#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
@media(min-width:769px){#gifTop{width:53%;max-width:600px}}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 40px;box-shadow:none;border-radius:0}

/* ✟ 先锋重工可拖拽伸展 Dock 栏 ✟ */
#dock {
    position: fixed;
    left: 24px;
    top: 30%;
    /* 鼠标不在时也显示背景和模糊，强化3D立体感，不搞太“淡雅” */
    background: rgba(10, 10, 12, 0.8); 
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 0px; /* 刀锋直角 */
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 999;
    width: 62px;
    /* 初始高度计算：10 padding*2 + 62 item height = 82px，精确裁剪隐藏文字按钮 */
    height: 82px; 
    overflow: hidden;
    cursor: move;
    transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s, backdrop-filter 0.3s, border-color 0.3s;
}

/* 鼠标悬停时展开显示全貌 */
#dock:hover {
    /* 展开高度计算：3*62 item + 2*12 gap + 2*10 padding = 230px */
    height: 230px; 
    background: rgba(4, 4, 5, 0.98);
    border-color: rgba(255, 255, 255, 0.5);
}

.item {
    width: 62px;
    height: 62px;
    border-radius: 0px; /* 直角 */
    background: #111113;
    border: 1px solid rgba(255, 255, 255, 0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    overflow: hidden;
    transition: background 0.3s, color 0.3s, border-color 0.3s, transform 0.2s, opacity 0.3s;
    color: #fff;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 2px;
    writing-mode: vertical-lr;
    text-orientation: mixed;
    box-sizing: border-box; 
    opacity: 1; /* 初始全部不透明 */
}

/* 初始状态下，隐藏文字按钮部分 */
#dock .item:not(:first-child) {
    opacity: 0;
}
/* 悬停时显示文字按钮 */
#dock:hover .item {
    opacity: 1;
}

/* 文字按钮的 Hover 效果 */
#dock .item:not(:first-child):hover {
    background: #fff;
    color: #000;
    border-color: #fff;
}

.item img {
    width: 100%;
    height: 100%;
    /* 关键修改：contain 确保照片在容器内原比例显示，不裁剪，不拉伸（不压缩），完整展示 */
    object-fit: contain; 
    /* 彻底去除可能存在的任何滤镜，保留原照片效果 */
    filter: none !important;
}

/* A-F 3个一组矩阵 - 恢复 3 列布局 */
.brand-section {
    width: 80%;
    max-width: 900px;
    margin: 20px 0 60px;
    display: grid;
    /* 强制横向 3 列一组，维持原来的大小和间距风格 */
    grid-template-columns: repeat(3, 1fr); 
    gap: 15px; 
}
.brand-tag {
    font-size: 16px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #555;
    text-transform: uppercase;
    text-align: center;
    padding: 15px;
    border: 1px solid rgba(255, 255, 255, 0.02);
    transition: color 0.5s, border-color 0.5s, background 0.5s;
}
.brand-tag:hover {
    color: #fff;
    border-color: rgba(255, 255, 255, 0.3);
    background: rgba(255, 255, 255, 0.03);
}

/* 弹窗黑化与滤镜设置保持原样 */
#mask {display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);justify-content:center;align-items:center;z-index:9999}
#card {background:#0a0a0c;padding:30px;border-radius:0px;border:1px solid rgba(255,255,255,0.2);position:relative}
#card img {width:min(80vw,320px);filter: grayscale(100%); transition: filter 0.3s}
#card img:hover {filter: grayscale(0%)}
#close {position:absolute;right:12px;top:8px;font-size:20px;font-weight:200;cursor:pointer;color:#888}
#close:hover {color:#fff}
</style></head>
<body>

<!-- ✟ 先锋重工可拖拽伸展 Dock ✟ -->
<div id="dock">
<div class="item"><img src="and.png"></div> <!-- 照片更名为 and.png 且已优化显示不压缩无滤镜 -->
<div class="item" onclick="location.href='https://andseethingsasido.github.io/and666/'">商品</div>
<div class="item" onclick="mask.style.display='flex'">公众号</div>
</div>

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<!-- A-F 强制3列一组矩阵 -->
<div class="brand-section">
    <div class="brand-tag">A</div>
    <div class="brand-tag">B</div>
    <div class="brand-tag">C</div>
    <div class="brand-tag">D</div>
    <div class="brand-tag">E</div>
    <div class="brand-tag">F</div>
</div>

<div id="mask" onclick="if(event.target===this)this.style.display='none'">
<div id="card"><div id="close" onclick="mask.style.display='none'">✕</div><img src="gozhonghao.jpg"></div>
</div>

<script>
gifBottom.onclick=()=>location.href="https://andseethingsasido.github.io/and666/";

// ==========================================
// 🛠️ 纯净物理拖拽引擎（兼容PC与移动端）
// ==========================================
const dock = document.getElementById('dock');
let isDragging = false;
let startX, startY, initialLeft, initialTop;
let hasMoved = false;

function dragStart(e) {
    hasMoved = false;
    isDragging = true;
    
    // 兼容触屏和鼠标获取 clientX/Y
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const rect = dock.getBoundingClientRect();
    startX = clientX;
    startY = clientY;
    initialLeft = rect.left;
    initialTop = rect.top;
    
    // 拖动时临时关闭过渡动画，保证跟随感
    dock.style.transition = 'none';
}

function dragMove(e) {
    if (!isDragging) return;
    
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    const dx = clientX - startX;
    const dy = clientY - startY;
    
    // 允许微小位移（抖动阈值），超过该位移才认定为拖拽
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
        hasMoved = true;
    }
    
    // 计算移动后坐标并应用
    dock.style.left = (initialLeft + dx) + 'px';
    dock.style.top = (initialTop + dy) + 'px';
}

function dragEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    
    // 拖动结束恢复展开过渡动画
    dock.style.transition = 'height 0.4s cubic-bezier(0.16, 1, 0.3, 1), background 0.3s, backdrop-filter 0.3s, border-color 0.3s';
    
    // 如果明显的发生了位移，在脚本触发层面阻止点击逻辑
    if (hasMoved) {
        e.preventDefault();
    }
}

// 绑定鼠标事件
dock.addEventListener('mousedown', dragStart);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);

// 绑定触屏事件
dock.addEventListener('touchstart', dragStart, { passive: true });
document.addEventListener('touchmove', dragMove, { passive: false });
document.addEventListener('touchend', dragEnd);
</script>
</body>
</html>
