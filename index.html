<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Welcome</title>
    <style>
        /* 1. 核心布局修改 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column; /* 垂直排列 */
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer; /* 全页面点击提示手型 */
        }

        /* 2. 图片通用样式修改 */
        img {
            max-width: 80%;  /* 调整图片最大宽度 */
            max-height: 45%; /* 防止两张图加起来把屏幕撑爆 */
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            user-select: none;
            -webkit-user-drag: none;
            margin: 10px 0; /* 上下两张图之间留出 10 像素的全黑空隙 */
        }
    </style>
</head>
<body>

    <!-- 顶层的 GIF -->
    <img id="gifTop" src="and666.gif" alt="Live View Top">

    <!-- 底层的 GIF （已为你精准修改为 and777.gif） -->
    <img id="gifBottom" src="and777.gif" alt="Live View Bottom">

    <script>
        // 只要点击页面的任何地方，就会立刻丝滑跳转
        document.body.addEventListener('click', function() {
            window.location.href = "https://andseethingsasido.github.io/page2/"; 
        });
    </script>

</body>
</html>
