<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Welcome</title>
<style>
html,body{margin:0;padding:24px 0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;overflow-y:auto;scroll-behavior:smooth}
img{user-select:none;-webkit-user-drag:none}
#gifTop{width:80%;max-width:900px;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0}
@media(min-width:769px){#gifTop{width:53%;max-width:600px}}
#gifBottom{max-width:80%;max-height:45vh;border-radius:6px;box-shadow:0 0 20px rgba(255,255,255,.12);margin:12px 0;cursor:pointer}
#dao{width:80%;max-width:900px;margin:24px 0 20px;box-shadow:none;border-radius:0}

/* 先锋品牌文本区样式 */
.brand-container {
    width: 80%;
    max-width: 900px;
    margin: 40px 0 60px 0;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 30px;
    text-align: center;
}
.brand-item {
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #888;
    text-transform: uppercase;
    transition: color 0.4s ease, transform 0.4s ease;
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.03);
    border-radius: 4px;
}
.brand-item:hover {
    color: #fff;
    transform: translateY(-3px);
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}

#dock{position:fixed;left:12px;top:50%;transform:translate(-58%,-50%);transition:.3s;backdrop-filter:blur(18px);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:10px;display:flex;flex-direction:column;gap:10px;z-index:99}
#dock:hover{transform:translate(0,-50%)}
.item{width:62px;height:62px;border-radius:16px;background:rgba(255,255,255,.15);display:flex;justify-content:center;align-items:center;cursor:pointer;overflow:hidden;transition:.2s;font-size:13px;letter-spacing:1px}
.item:hover{transform:scale(1.08)}
.item img{width:100%;height:100%;object-fit:cover}
#mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);justify-content:center;align-items:center;z-index:999}
#card{background:rgba(255,255,255,.12);padding:24px;border-radius:24px;position:relative}
#card img{width:min(80vw,320px)}
#close{position:absolute;right:10px;top:6px;font-size:24px;cursor:pointer}
</style></head>
<body>

<div id="dock">
<!-- 将第一个空按钮改为了直达底部品牌的锚点跳转 -->
<div class="item" onclick="document.getElementById('brands').scrollIntoView({behavior:'smooth'})">系列</div>
<div class="item" onclick="location.href='https://andseethingsasido.github.io/and666/'">商品</div>
<div class="item" onclick="mask.style.display='flex'">公众号</div>
</div>

<img id="gifTop" src="and666.gif">
<img id="gifBottom" src="and777.gif">
<img id="dao" src="dao.png">

<!-- 融入暗黑美学的品牌展示板块 -->
<div class="brand-container" id="brands">
    <div class="brand-item">Rick Owens</div>
    <div class="brand-item">Chrome Hearts</div>
    <div class="brand-item">Balenciaga Campaign</div>
    <div class="brand-item">Vetements</div>
    <div class="brand-item">Alyx</div>
    <div class="brand-item">Enfants Riches Déprimés</div>
</div>

<div id="mask" onclick="if(event.target===this)this.style.display='none'">
<div id="card"><div id="close" onclick="mask.style.display='none'">✕</div><img src="gozhonghao.jpg"></div>
</div>

<script>
gifBottom.onclick=()=>location.href="https://andseethingsasido.github.io/and666/";
</script>
</body></html>
