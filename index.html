<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        /* 纯黑背景，且让 GIF 居中 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer; /* 鼠标变成手型，提示可以点击 */
        }

        /* GIF 样式：自适应屏幕，保持高清比例 */
        img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            user-select: none; /* 防止长按或拖拽图片 */
            -webkit-user-drag: none;
        }
    </style>
</head>
<body>

    <!-- 已经帮你精准对应了你上传的 and666.gif 文件名 -->
    <img id="bgGif" src="and666.gif" alt="Live View">

    <script>
        // 只要点击页面的任何地方，就会立刻丝滑跳转
        document.body.addEventListener('click', function() {
            window.location.href = "https://andseethingsasido.github.io/page2/"; 
        });
    </script>

</body>
</html>
